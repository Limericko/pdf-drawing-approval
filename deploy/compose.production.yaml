name: pdf-approval-production

x-runtime: &runtime
  image: ${PDF_APPROVAL_IMAGE:?set PDF_APPROVAL_IMAGE to an immutable registry digest}
  init: true
  read_only: true
  restart: unless-stopped
  cap_drop: ["ALL"]
  security_opt: ["no-new-privileges:true"]
  stop_grace_period: 45s
  pids_limit: 256
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

x-common-environment: &common-environment
  NODE_ENV: production
  PDF_APPROVAL_RUNTIME_MODE: platform
  PDF_APPROVAL_PUBLIC_BASE_URL: ${PDF_APPROVAL_PUBLIC_BASE_URL:?set the canonical HTTPS URL}
  PDF_APPROVAL_STORAGE_DRIVER: s3
  PDF_APPROVAL_STORAGE_S3_ENDPOINT: ${PDF_APPROVAL_STORAGE_S3_ENDPOINT:-https://oss-cn-hongkong.aliyuncs.com}
  PDF_APPROVAL_STORAGE_S3_REGION: cn-hongkong
  PDF_APPROVAL_STORAGE_S3_BUCKET: ${PDF_APPROVAL_STORAGE_S3_BUCKET:?set the private OSS bucket}
  PDF_APPROVAL_STORAGE_S3_FORCE_PATH_STYLE: "false"
  PDF_APPROVAL_STORAGE_S3_ACCESS_KEY_FILE: /run/secrets/pdf-approval/oss-access-key.secret
  PDF_APPROVAL_STORAGE_S3_SECRET_KEY_FILE: /run/secrets/pdf-approval/oss-secret-key.secret
  PDF_APPROVAL_INVITATION_HMAC_KEYRING_FILE: /run/secrets/pdf-approval/invitation-hmac-keyring.secret
  PDF_APPROVAL_WEBDAV_ALLOWED_HOSTS: ${PDF_APPROVAL_WEBDAV_ALLOWED_HOSTS:-}

services:
  web:
    <<: *runtime
    command: ["web"]
    environment:
      <<: *common-environment
      PORT: "8080"
      PDF_APPROVAL_PLATFORM_WEB_DATABASE_URL_FILE: /run/secrets/pdf-approval/database-url.secret
      PDF_APPROVAL_TOTP_KEYRING_FILE: /run/secrets/pdf-approval/totp-keyring.secret
      PDF_APPROVAL_RECOVERY_HMAC_KEYRING_FILE: /run/secrets/pdf-approval/recovery-hmac-keyring.secret
      PDF_APPROVAL_CSRF_HMAC_KEYRING_FILE: /run/secrets/pdf-approval/csrf-hmac-keyring.secret
      PDF_APPROVAL_COOKIE_SECURE: "true"
      PDF_APPROVAL_TRUST_PROXY: "1"
      PDF_APPROVAL_PLATFORM_DB_POOL_MAX: ${PDF_APPROVAL_WEB_DB_POOL_MAX:-20}
    volumes:
      - type: bind
        source: ${PDF_APPROVAL_WEB_SECRET_DIR:?set the absolute web secret directory}
        target: /run/secrets/pdf-approval
        read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=10001,gid=10001,mode=0700,size=512m
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "node", "deploy/healthcheck.mjs"]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 30s
    cpus: 2.0
    mem_limit: 2g

  worker:
    <<: *runtime
    command: ["worker"]
    environment:
      <<: *common-environment
      PDF_APPROVAL_PLATFORM_WORKER_DATABASE_URL_FILE: /run/secrets/pdf-approval/database-url.secret
      PDF_APPROVAL_SMTP_HOST: ${PDF_APPROVAL_SMTP_HOST:?set SMTP host}
      PDF_APPROVAL_SMTP_PORT: ${PDF_APPROVAL_SMTP_PORT:-465}
      PDF_APPROVAL_SMTP_FROM: ${PDF_APPROVAL_SMTP_FROM:?set SMTP sender}
      PDF_APPROVAL_SMTP_SECURE: ${PDF_APPROVAL_SMTP_SECURE:-true}
      PDF_APPROVAL_SMTP_REQUIRE_TLS: ${PDF_APPROVAL_SMTP_REQUIRE_TLS:-false}
      PDF_APPROVAL_SMTP_USER: ${PDF_APPROVAL_SMTP_USER:?set SMTP username}
      PDF_APPROVAL_SMTP_PASSWORD_FILE: /run/secrets/pdf-approval/smtp-password.secret
      PDF_APPROVAL_WEBDAV_CREDENTIALS_FILE: /run/secrets/pdf-approval/webdav-credentials.json
      PDF_APPROVAL_WEBDAV_STAGING_ROOT: /var/lib/pdf-approval/webdav-staging
      PDF_APPROVAL_PLATFORM_DB_POOL_MAX: ${PDF_APPROVAL_WORKER_DB_POOL_MAX:-8}
      PDF_APPROVAL_WORKER_CONCURRENCY: ${PDF_APPROVAL_WORKER_CONCURRENCY:-4}
    volumes:
      - type: bind
        source: ${PDF_APPROVAL_WORKER_SECRET_DIR:?set the absolute worker secret directory}
        target: /run/secrets/pdf-approval
        read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=10001,gid=10001,mode=0700,size=1g
      - /var/lib/pdf-approval/webdav-staging:rw,noexec,nosuid,nodev,uid=10001,gid=10001,mode=0700,size=4g
    cpus: 2.0
    mem_limit: 3g

  migration:
    <<: *runtime
    profiles: ["tools"]
    restart: "no"
    command: ["migration"]
    environment:
      NODE_ENV: production
      PDF_APPROVAL_PLATFORM_MIGRATION_DATABASE_URL_FILE: /run/secrets/pdf-approval/database-url.secret
    volumes:
      - type: bind
        source: ${PDF_APPROVAL_MIGRATION_SECRET_DIR:?set the absolute migration secret directory}
        target: /run/secrets/pdf-approval
        read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=10001,gid=10001,mode=0700,size=64m

  bootstrap-admin:
    <<: *runtime
    profiles: ["tools"]
    restart: "no"
    command: ["bootstrap-admin"]
    environment:
      NODE_ENV: production
      PDF_APPROVAL_PLATFORM_BOOTSTRAP_DATABASE_URL_FILE: /run/secrets/pdf-approval/database-url.secret
      PDF_APPROVAL_TOTP_KEYRING_FILE: /run/secrets/pdf-approval/totp-keyring.secret
      PDF_APPROVAL_RECOVERY_HMAC_KEYRING_FILE: /run/secrets/pdf-approval/recovery-hmac-keyring.secret
    volumes:
      - type: bind
        source: ${PDF_APPROVAL_BOOTSTRAP_SECRET_DIR:?set the absolute bootstrap secret directory}
        target: /run/secrets/pdf-approval
        read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,uid=10001,gid=10001,mode=0700,size=64m

